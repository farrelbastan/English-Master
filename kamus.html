<!DOCTYPE html>
<html lang="id" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kamus Terjemahan Instan - English Mastery</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <link rel="stylesheet" href="style.css">

    <style>
        /* Desain Khusus Replika Google Search Snippet */
        .gt-container {
            max-width: 900px;
            margin: 30px auto;
            width: 100%;
        }

        /* --- TOP BAR (Dropdown Bahasa) --- */
        .lang-controls {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 15px;
        }

        .lang-select-box {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            padding: 10px 16px;
            color: #8ab4f8; /* Biru Google */
            font-size: 0.95rem;
            font-weight: 500;
            width: 250px;
            cursor: pointer;
            transition: background 0.2s;
        }

        .lang-select-box:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        .swap-btn {
            background: transparent;
            border: none;
            color: var(--text-secondary, #94a3b8);
            cursor: pointer;
            font-size: 1.1rem;
            padding: 8px;
            border-radius: 50%;
            transition: 0.2s;
        }

        .swap-btn:hover {
            background: rgba(255, 255, 255, 0.1);
            color: var(--text-primary, #f8fafc);
        }

        /* --- KOTAK INPUT & OUTPUT (Side by side) --- */
        .gt-box-wrapper {
            background: #202124; /* Warna khas dark mode snippet Google */
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            overflow: hidden;
            box-shadow: 0 4px 20px rgba(0,0,0,0.2);
            display: flex;
            flex-direction: column;
        }

        .translate-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
        }

        .gt-side {
            position: relative;
            display: flex;
            flex-direction: column;
            min-height: 200px;
        }

        .gt-side-left {
            border-right: 1px solid rgba(255, 255, 255, 0.1);
        }

        .gt-side-right {
            background-color: #303134; /* Sedikit lebih terang untuk output */
        }

        .text-field {
            width: 100%;
            background: transparent;
            border: none;
            color: var(--text-primary, #f8fafc);
            font-family: inherit;
            font-size: 1.6rem; /* Teks lebih besar ala snippet */
            resize: none;
            outline: none;
            padding: 24px;
            flex-grow: 1;
        }

        .text-field::placeholder {
            color: #9aa0a6;
        }

        .output-text {
            padding: 24px;
            font-size: 1.6rem;
            color: var(--text-primary, #f8fafc);
            flex-grow: 1;
            word-wrap: break-word;
        }

        .clear-btn {
            position: absolute;
            top: 24px;
            right: 20px;
            background: transparent;
            border: none;
            color: #9aa0a6;
            font-size: 1.2rem;
            cursor: pointer;
            display: none; /* Muncul via JS */
        }

        /* --- TOOLBAR (Ikon Bawah Kotak) --- */
        .tools-bar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 20px 20px 20px;
        }

        .tool-icons-group {
            display: flex;
            gap: 15px;
        }

        .tool-icon {
            background: transparent;
            border: none;
            color: #9aa0a6;
            font-size: 1.2rem;
            cursor: pointer;
            padding: 6px;
            border-radius: 50%;
            transition: 0.2s;
        }

        .tool-icon:hover {
            color: #f8fafc;
            background: rgba(255,255,255,0.05);
        }

        /* Animasi Mikrofon */
        @keyframes pulse-red {
            0% { background: rgba(239, 68, 68, 0.1); }
            50% { background: rgba(239, 68, 68, 0.3); }
            100% { background: rgba(239, 68, 68, 0.1); }
        }
        .tool-icon.recording {
            color: #ef4444 !important;
            animation: pulse-red 1.5s infinite;
        }

        /* --- DETAIL KAMUS (List di Bawah Kotak) --- */
        .dictionary-details {
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            padding: 20px 24px;
            display: none; /* Muncul jika kata ditemukan di database lokal */
        }

        .details-header {
            font-size: 1.1rem;
            color: var(--text-primary, #f8fafc);
            margin-bottom: 20px;
        }

        .pos-title {
            font-size: 0.9rem;
            color: #9aa0a6;
            font-style: italic;
            margin-bottom: 10px;
            padding-bottom: 10px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .detail-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .detail-word {
            font-size: 1.1rem;
            color: #f8fafc;
            margin-bottom: 4px;
        }

        .detail-synonyms {
            font-size: 0.9rem;
            color: #9aa0a6;
        }

        .detail-badge {
            background: rgba(59, 130, 246, 0.15);
            color: #8ab4f8;
            padding: 4px 10px;
            border-radius: 6px;
            font-size: 0.75rem;
            font-weight: 700;
        }

        /* --- Pustaka Vault Kata di Bawah --- */
        .vault-section {
            margin-top: 50px;
        }

        .vault-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .clear-history-btn {
            background: transparent;
            color: #ef4444;
            border: 1px solid rgba(239, 68, 68, 0.3);
            padding: 8px 16px;
            border-radius: 8px;
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
        }

        .clear-history-btn:hover {
            background: rgba(239, 68, 68, 0.1);
        }

        .vault-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
        }

        .vocab-card {
            background: #1e293b;
            border-radius: 12px;
            padding: 20px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            cursor: pointer;
            transition: 0.2s;
        }

        .vocab-card:hover {
            border-color: #3b82f6;
            transform: translateY(-2px);
        }

        .empty-history {
            grid-column: 1 / -1;
            text-align: center;
            padding: 40px;
            color: #64748b;
            font-style: italic;
            background: rgba(0,0,0,0.1);
            border-radius: 12px;
            border: 1px dashed rgba(255,255,255,0.1);
        }

        /* RESPONSIVE */
        @media (max-width: 768px) {
            .translate-grid {
                grid-template-columns: 1fr;
            }
            .gt-side-left {
                border-right: none;
                border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            }
            .lang-select-box {
                width: 100%;
            }
        }
    </style>
</head>
<body>

    <div class="app-wrapper">
        
        <header class="main-header" style="padding-bottom: 15px; border-bottom: 1px solid rgba(255,255,255,0.05);">
            <div style="display: flex; align-items: center; gap: 15px;">
                <a href="index.html" class="footer-btn" style="padding: 10px 15px; text-decoration: none; font-size: 0.9rem;">
                    <i class="fa-solid fa-house-user"></i> Dashboard
                </a>
                <div>
                    <span style="font-size: 0.85rem; color: #3b82f6; font-weight: 700; text-transform: uppercase;">Google Search Snippet Mode</span>
                    <h2 style="margin: 0; font-size: 1.4rem; font-weight: 800;">Kamus & Auto Translate</h2>
                </div>
            </div>
        </header>

        <main class="gt-container">
            
            <div class="lang-controls">
                <div class="lang-select-box">
                    <span id="src-lang-text">Indonesia</span>
                    <i class="fa-solid fa-caret-down"></i>
                </div>
                
                <button class="swap-btn" id="gt-swap-btn" title="Tukar Bahasa">
                    <i class="fa-solid fa-arrow-right-arrow-left"></i>
                </button>
                
                <div class="lang-select-box">
                    <span id="tgt-lang-text">Inggris</span>
                    <i class="fa-solid fa-caret-down"></i>
                </div>
            </div>

            <div class="gt-box-wrapper">
                <div class="translate-grid">
                    
                    <div class="gt-side gt-side-left">
                        <textarea id="gt-input-field" class="text-field" placeholder="Ketik kata atau kalimat..."></textarea>
                        <button id="clear-btn" class="clear-btn" title="Hapus teks"><i class="fa-solid fa-xmark"></i></button>
                        
                        <div class="tools-bar">
                            <div class="tool-icons-group">
                                <button class="tool-icon" id="gt-mic-btn" title="Suara"><i class="fa-solid fa-microphone"></i></button>
                                <button class="tool-icon" title="Dengarkan (Segera hadir)"><i class="fa-solid fa-volume-high"></i></button>
                            </div>
                            <span style="font-size: 0.8rem; color: #64748b;" id="char-counter">0/5000</span>
                        </div>
                    </div>

                    <div class="gt-side gt-side-right">
                        <div id="gt-output-field" class="output-text" style="color: #9aa0a6;">Terjemahan</div>
                        
                        <div class="tools-bar">
                            <div class="tool-icons-group">
                                <button class="tool-icon" title="Salin" onclick="navigator.clipboard.writeText(document.getElementById('gt-output-field').innerText); alert('Disalin!');"><i class="fa-regular fa-copy"></i></button>
                                <button class="tool-icon" title="Dengarkan (Segera hadir)"><i class="fa-solid fa-volume-high"></i></button>
                            </div>
                            <span id="source-badge" style="font-size: 0.75rem; background: rgba(59,130,246,0.1); color:#8ab4f8; padding: 4px 10px; border-radius: 6px; font-weight:700; display: none;">Auto Translate</span>
                        </div>
                    </div>

                </div>

                <div id="meta-box" class="dictionary-details">
                    </div>
            </div>

        </main>

        <section class="vault-section">
            <div class="vault-header">
                <h3 style="font-size: 1.2rem; font-weight: 800; margin: 0; color: var(--text-primary);">
                    <i class="fa-solid fa-clock-rotate-left" style="color: #64748b;"></i> Riwayat Pencarian
                </h3>
                <button class="clear-history-btn" id="clear-history-btn"><i class="fa-solid fa-trash-can"></i> Hapus Riwayat</button>
            </div>
            
            <div class="vault-grid" id="history-vault">
                </div>
        </section>

    </div>

    <script src="database-kamus.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const inputField = document.getElementById('gt-input-field');
            const outputField = document.getElementById('gt-output-field');
            const metaBox = document.getElementById('meta-box');
            const charCounter = document.getElementById('char-counter');
            const historyVault = document.getElementById('history-vault');
            const clearHistoryBtn = document.getElementById('clear-history-btn');
            const clearInputBtn = document.getElementById('clear-btn');
            const sourceBadge = document.getElementById('source-badge');
            
            // Elemen Swap & Mic
            const swapBtn = document.getElementById('gt-swap-btn');
            const micBtn = document.getElementById('gt-mic-btn');
            const srcLangText = document.getElementById('src-lang-text');
            const tgtLangText = document.getElementById('tgt-lang-text');

            // --- STATE UTAMA ---
            let searchHistory = JSON.parse(localStorage.getItem('kamusHistory')) || [];
            let historyTimeout; 
            let isIndoToEnglish = true; // Default sesuai UI baru (Kiri: Indo, Kanan: Ing)

            // --- RENDER RIWAYAT ---
            function renderHistory() {
                historyVault.innerHTML = '';
                
                if (searchHistory.length === 0) {
                    historyVault.innerHTML = `<div class="empty-history"><i class="fa-solid fa-ghost" style="font-size: 2rem; margin-bottom: 10px; opacity: 0.5;"></i><br>Belum ada kata yang dicari.</div>`;
                    return;
                }

                searchHistory.forEach(item => {
                    const card = document.createElement('div');
                    card.className = 'vocab-card';
                    
                    // Menyesuaikan display dengan state arah bahasa
                    const displayWord = isIndoToEnglish ? (item.indo || item.word) : (item.word || item.indo);
                    const displayTranslation = isIndoToEnglish ? (item.word || item.indo) : (item.indo || item.word);
                    const cardBadge = item.level || item.type || 'Kalimat';

                    card.innerHTML = `
                        <div style="display:flex; justify-content:space-between; font-weight:700; margin-bottom:5px;">
                            <span style="color:#8ab4f8; font-size:1.1rem;">${displayWord}</span>
                            <span style="font-size:0.75rem; color:#9aa0a6;">${cardBadge}</span>
                        </div>
                        <p style="margin:0; font-size:0.9rem; color:#e8eaed; text-overflow: ellipsis; overflow: hidden; white-space: nowrap;">${displayTranslation}</p>
                    `;
                    
                    card.addEventListener('click', () => {
                        inputField.value = displayWord;
                        translateLive();
                        window.scrollTo({ top: 0, behavior: 'smooth' });
                    });

                    historyVault.appendChild(card);
                });
            }

            function addToHistory(wordObj) {
                // Hindari crash jika properti word/indo tidak ada
                if(!wordObj.word || !wordObj.indo) return;

                searchHistory = searchHistory.filter(item => item.word.toLowerCase() !== wordObj.word.toLowerCase());
                searchHistory.unshift(wordObj);
                if (searchHistory.length > 12) searchHistory.pop();
                localStorage.setItem('kamusHistory', JSON.stringify(searchHistory));
                renderHistory();
            }

            // --- FUNGSI API TRANSLATE (UNTUK KALIMAT / KATA TIDAK DIKENAL) ---
            async function performApiTranslation(text) {
                const sourceLang = isIndoToEnglish ? 'id' : 'en';
                const targetLang = isIndoToEnglish ? 'en' : 'id';

                try {
                    outputField.innerText = "Menerjemahkan...";
                    outputField.style.color = "#9aa0a6";
                    metaBox.style.display = "none"; 
                    sourceBadge.style.display = "none";

                    const response = await fetch(`https://api.mymemory.translated.net/get?q=${encodeURIComponent(text)}&langpair=${sourceLang}|${targetLang}`);
                    const data = await response.json();

                    if (data && data.responseData) {
                        outputField.innerText = data.responseData.translatedText;
                        outputField.style.color = "#f8fafc";
                        sourceBadge.style.display = "block";
                        sourceBadge.innerText = "Auto Translate";
                        
                        if(text.includes(' ') && data.responseData.translatedText) {
                            addToHistory({
                                word: isIndoToEnglish ? data.responseData.translatedText : text,
                                indo: isIndoToEnglish ? text : data.responseData.translatedText,
                                type: "Kalimat",
                                level: "Terjemahan Bebas"
                            });
                        }
                    }
                } catch (error) {
                    console.error("Gagal menerjemahkan via API", error);
                    outputField.innerText = "Gagal memuat API.";
                }
            }

            // --- LOGIKA LIVE TRANSLATE HIBRIDA ---
            function translateLive() {
                const textValue = inputField.value.trim();
                charCounter.innerText = `${textValue.length}/5000`;
                
                // Kontrol visibilitas tombol "X"
                clearInputBtn.style.display = textValue.length > 0 ? 'block' : 'none';

                clearTimeout(historyTimeout);

                if (textValue === "") {
                    outputField.innerText = "Terjemahan";
                    outputField.style.color = "#9aa0a6";
                    metaBox.style.display = "none";
                    sourceBadge.style.display = "none";
                    return;
                }

                // Jika mengandung spasi (kalimat)
                if (textValue.includes(' ')) {
                    historyTimeout = setTimeout(() => {
                        performApiTranslation(textValue);
                    }, 500); 
                    return;
                }

                // Jika kata tunggal, cari di DB lokal (database-kamus.js) dengan pencarian yang akurat
                let match;
                if (typeof MasterDictionary !== 'undefined') {
                    const query = textValue.toLowerCase();
                    
                    if (isIndoToEnglish) {
                        // Pecah kata berdasarkan koma agar bisa mencari sinonim
                        match = MasterDictionary.find(item => {
                            if (!item.indo) return false;
                            const indoWords = item.indo.toLowerCase().split(',').map(w => w.trim());
                            return indoWords.includes(query);
                        });
                    } else {
                        // Pencarian Inggris ke Indo
                        match = MasterDictionary.find(item => item.word && item.word.toLowerCase() === query);
                    }
                }

                if (match) {
                    // Ketemu di DB
                    outputField.innerText = isIndoToEnglish ? match.word : match.indo;
                    outputField.style.color = "#f8fafc"; 
                    sourceBadge.style.display = "block";
                    sourceBadge.innerText = "Database Lokal";

                    // Format Meta Box meniru Google Snippet List
                    const badgeLevel = match.level || match.type || 'General';
                    const mainTarget = isIndoToEnglish ? match.word : match.indo;
                    const contextText = match.example || 'No example provided.';

                    metaBox.style.display = "block";
                    metaBox.innerHTML = `
                        <div class="details-header">Terjemahan "${textValue}"</div>
                        <div class="pos-title">${match.type || 'Nomina / Verba'}</div>
                        <div class="detail-item">
                            <div class="detail-text-group">
                                <div class="detail-word">${mainTarget}</div>
                                <div class="detail-synonyms">Konteks: ${contextText}</div>
                            </div>
                            <div class="detail-badge">${badgeLevel}</div>
                        </div>
                    `;

                    historyTimeout = setTimeout(() => {
                        addToHistory(match);
                    }, 500);

                } else {
                    // Kata tunggal tapi tidak ada di DB, lempar ke API
                    historyTimeout = setTimeout(() => {
                        performApiTranslation(textValue);
                    }, 500);
                }
            }

            // --- INTERAKSI TOMBOL ---
            
            // Tombol X (Clear)
            clearInputBtn.addEventListener('click', () => {
                inputField.value = '';
                translateLive();
                inputField.focus();
            });

            // Tombol Swap
            swapBtn.addEventListener('click', () => {
                isIndoToEnglish = !isIndoToEnglish;
                
                if (isIndoToEnglish) {
                    srcLangText.innerText = "Indonesia";
                    tgtLangText.innerText = "Inggris";
                } else {
                    srcLangText.innerText = "Inggris";
                    tgtLangText.innerText = "Indonesia";
                }

                const tempInput = inputField.value;
                inputField.value = outputField.innerText === "Terjemahan" ? "" : outputField.innerText;
                translateLive();
                renderHistory();
            });

            // --- INTERAKSI MIKROFON (WEB SPEECH API) ---
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            if (SpeechRecognition) {
                const recognition = new SpeechRecognition();
                recognition.continuous = false;
                recognition.interimResults = false;

                micBtn.addEventListener('click', () => {
                    recognition.lang = isIndoToEnglish ? 'id-ID' : 'en-US';
                    
                    if (micBtn.classList.contains('recording')) {
                        recognition.stop();
                    } else {
                        recognition.start();
                    }
                });

                recognition.onstart = () => {
                    micBtn.classList.add('recording');
                    inputField.placeholder = "Mendengarkan suaramu...";
                };

                recognition.onend = () => {
                    micBtn.classList.remove('recording');
                    inputField.placeholder = "Ketik kata atau kalimat...";
                };

                recognition.onresult = (event) => {
                    const speechToText = event.results[0][0].transcript;
                    inputField.value = speechToText.replace(/\.$/, ''); 
                    translateLive();
                };

                recognition.onerror = () => {
                    micBtn.classList.remove('recording');
                };
            } else {
                micBtn.addEventListener('click', () => {
                    alert("Browser kamu belum mendukung Web Speech API.");
                });
            }

            // Listeners Utama
            inputField.addEventListener('input', translateLive);
            clearHistoryBtn.addEventListener('click', () => {
                if(confirm("Apakah kamu yakin ingin menghapus semua riwayat pencarian?")) {
                    searchHistory = [];
                    localStorage.removeItem('kamusHistory');
                    renderHistory();
                }
            });

            // Inisialisasi
            renderHistory();
        });
    </script>
</body>
</html>
